# Server Port for test (random port)
server.port=0

# Security Properties mapping directly to Environment Variables (loaded from .env)
security.admin.username=${SECURITY_ADMIN_USERNAME}
security.admin.password=${SECURITY_ADMIN_PASSWORD}

# Database Configuration (Default properties targeting the test profiles)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging configuration during testing
logging.level.com.reporting=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
