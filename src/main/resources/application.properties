# Spring Boot Server configuration
server.port=${PORT:8101}
spring.threads.virtual.enabled=true

# Datasource configuration (PostgreSQL Docker container)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5433/agentic_ai}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool — tuned for Cloud Run + Neon serverless Postgres
# maxLifetime: retire connections before Neon's idle timeout (~5 min). Must be < Neon's server keepalive.
spring.datasource.hikari.max-lifetime=120000
# keepaliveTime: ping idle connections every 60 s to prevent Neon from closing them silently.
spring.datasource.hikari.keepalive-time=60000
# connectionTimeout: fail fast if no connection is available within 10 s (avoids long request queuing).
spring.datasource.hikari.connection-timeout=10000
# idleTimeout: return idle connections to the pool after 60 s (less than maxLifetime).
spring.datasource.hikari.idle-timeout=60000
# minimumIdle: keep 1 warm connection; set to 0 if you want full scale-to-zero.
spring.datasource.hikari.minimum-idle=1
# maximumPoolSize: 5 (tuned for concurrent metadata discovery requests)
spring.datasource.hikari.maximum-pool-size=5
# Validate connection before handing it out of the pool.
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA / Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# JDBC query timeout — prevents runaway DWH queries from hanging Cloud Run instances.
# Applied globally via JdbcConfig; overridable per-template at the SqlGeneratorService level.
spring.reporting.jdbc.query-timeout-seconds=120

# Logging — only business layer at DEBUG, suppress verbose Hibernate SQL
logging.level.com.reporting=DEBUG
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
# Include correlation ID in all log lines (populated by CorrelationIdFilter)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{correlationId:-no-corr-id}] %-5level %logger{36} - %msg%n

# Spring Boot Actuator — health and readiness probes for Cloud Run
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
# liveness: JVM is alive; readiness: DB connection is up and caches are warm
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# Security Properties mapping to Environment Variables
security.admin.username=${SECURITY_ADMIN_USERNAME:admin}
security.admin.password=${SECURITY_ADMIN_PASSWORD:}
security.admin.role=${SECURITY_ADMIN_ROLE:USER}
