# Spring Boot Server configuration
server.port=8101

# Datasource configuration (PostgreSQL Docker container)
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/agentic_ai
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging — only business layer at DEBUG, suppress verbose Hibernate SQL
logging.level.com.reporting=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
